name: code-review-env
version: 1.0.0
description: >
  An advanced OpenEnv environment where an AI agent performs code review tasks
  on Python snippets using an interactive developer terminal. Supports tools
  (RUN_TESTS, EDIT_CODE, SUBMIT) with dense reward signals.
tasks:
  - name: identify-bug
    difficulty: easy
    max_steps: 4
    reward_range: [0.0, 1.0]
  - name: suggest-fix
    difficulty: medium
    max_steps: 6
    reward_range: [0.0, 1.0]
  - name: full-review
    difficulty: hard
    max_steps: 8
    reward_range: [0.0, 1.0]
  - name: security-audit
    max_steps: 6
    reward_range: [0.0, 1.0]
  - name: performance-refactor
    max_steps: 6
    reward_range: [0.0, 1.0]
action_space:
  type: text
  description: Free-form string response from the agent (can contain structured JSON tool commands)
observation_space:
  type: object
  fields:
    - code_snippet: string
    - language: string
    - task_type: string
    - task_description: string
    - step_number: integer
    - max_steps: integer
    - context: string (optional)
    - feedback: string (Terminal output / Tool feedback)
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
